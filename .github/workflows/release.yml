name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach assets to"
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Resolve tag
        id: meta
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Build static musl binaries
        run: |
          docker buildx build --target bin \
            --platform linux/amd64,linux/arm64 \
            --output "type=local,dest=dist" \
            --file docker/Dockerfile .
          install -m 0755 dist/linux_amd64/magicjar magicjar-x86_64-unknown-linux-musl
          install -m 0755 dist/linux_arm64/magicjar magicjar-aarch64-unknown-linux-musl
      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            magicjar-x86_64-unknown-linux-musl \
            magicjar-aarch64-unknown-linux-musl \
            --clobber --repo "$GITHUB_REPOSITORY"
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag ghcr.io/clintval/magicjar:${{ steps.meta.outputs.tag }} \
            --tag ghcr.io/clintval/magicjar:latest \
            --file docker/Dockerfile .
